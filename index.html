<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safari dos Animais</title>

<style>
body{
    margin:0;
    background:#7ec850;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

#info{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

canvas{
    border:3px solid #333;
    background:#7ec850;
    max-width:95vw;
    max-height:85vh;
}
</style>
</head>

<body>

<h1>🦁 Safari dos Animais 🦒</h1>

<div id="info">
Animais visitados: <span id="contador">0</span>
</div>

<canvas id="game" width="800" height="1200"></canvas>

<audio id="somSafari" loop> 
 <source src="Safari.mp3" type="audio/mpeg"> 
</audio>

<video id="video-vitoria" width="315" height="566" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); border:5px solid #fff; z-index:100;">
 -- Substitua 'seu-video.mp4' pelo caminho do seu arquivo de vídeo -->
 <source src="Convite Video.webm" type="video/webm"> Seu navegador não suporta vídeos em HTML5.
</video>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const contador = document.getElementById("contador");


let musicaIniciada = false;
let animando = false;

let inicioAnim = null;
let fimAnim = null;

let duracaoAnim = 600;

/* ==========================
   MOVIMENTO DO JIPE (NOVO)
========================== */
let movendoJipe = false;
let destinoJipe = null;
let velocidadeJipe = 0.08;

/* ==========================
   CONFIGURAÇÃO DO MAPA
========================== */

const CELL_X = 250;
const CELL_Y = 250;

const OFFSET_X = 150;
const OFFSET_Y = 120;

let anguloJipe = Math.PI; // 0 = direita, PI/2 = baixo, PI = esquerda, -PI/2 = cima   

function iniciarMusica(){
if(musicaIniciada) return;
musicaIniciada = true;
document
 .getElementById("somSafari")
 .play()
 .catch(()=>{});
}

function px(col){
    return OFFSET_X + col * CELL_X;
}

function py(row){
    return OFFSET_Y + row * CELL_Y;
}

/* ==========================
   ANIMAIS
========================== */

const animais = [

{emoji:"🦓",nome:"Zebra",x:1,y:0},
{emoji:"🦁",nome:"Leão",x:2,y:0},

{emoji:"🦒",nome:"Girafa",x:0,y:1},
{emoji:"🐘",nome:"Elefante",x:1,y:1},
{emoji:"🦏",nome:"Rinoceronte",x:2,y:1},

{emoji:"🦛",nome:"Hipopótamo",x:0,y:2},
{emoji:"🐊",nome:"Crocodilo",x:1,y:2},
{emoji:"🐒",nome:"Macaco",x:2,y:2},

{emoji:"🦜",nome:"Papagaio",x:0,y:3},
{emoji:"🐆",nome:"Leopardo",x:1,y:3},
{emoji:"🦘", nome:"Canguru", x:2, y:3}

];

/* ==========================
   SORTEIO DO CAMINHO
========================== */

function embaralhar(v){

    let a = [...v];

    for(let i=a.length-1;i>0;i--){

        let j =
        Math.floor(Math.random()*(i+1));

        [a[i],a[j]] =
        [a[j],a[i]];
    }

    return a;
}


let caminho = embaralhar(animais).slice(0,5);

let progresso = 0;

/* ==========================
   JIPE E CHEGADA
========================== */

const jeep = {
    x:0,
    y:0
};

const chegada = {
    x:0,
    y:4
};

/* ==========================
   FUNÇÃO NOVA (MOVIMENTO)
========================== */

function moverJipePara(x, y){
destinoJipe = {x, y};
movendoJipe = true;
}

/* ==========================
   VEGETAÇÃO
========================== */

const vegetacao = [];

for(let i=0;i<400;i++){

    vegetacao.push({

        emoji:[
            "🌴",
            "🌳"
        ][Math.floor(Math.random()*2)],

        tamanho:
            25 + Math.random()*45,

        x:
            Math.random()*800,

        y:
            Math.random()*1200

    });

}

/* ==========================
   BRILHO
========================== */

let brilho = 0;

/* ==========================
   TRILHAS
========================== */

function trilha(x1,y1,x2,y2){

    ctx.lineCap="round";

    ctx.strokeStyle="#8b5a2b";
    ctx.lineWidth=70;

    ctx.beginPath();
    ctx.moveTo(px(x1),py(y1));
    ctx.lineTo(px(x2),py(y2));
    ctx.stroke();

    ctx.strokeStyle="#c89b5d";
    ctx.lineWidth=50;

    ctx.beginPath();
    ctx.moveTo(px(x1),py(y1));
    ctx.lineTo(px(x2),py(y2));
    ctx.stroke();
}

function desenharTrilhas(){

    trilha(0,0,1,0);
    trilha(1,0,2,0);

    trilha(0,1,1,1);
    trilha(1,1,2,1);

    trilha(0,2,1,2);
    trilha(1,2,2,2);

    trilha(0,3,1,3);

    trilha(0,0,0,1);
    trilha(0,1,0,2);
    trilha(0,2,0,3);
    trilha(0,3,0,4);

    trilha(1,0,1,1);
    trilha(1,1,1,2);

    trilha(2,0,2,1);
    trilha(2,1,2,2);

    trilha(2,2,2,3);
    trilha(1,3,2,3);
    trilha(1,2,1,3);


}

/* ==========================
   VEGETAÇÃO
========================== */

function desenharVegetacao(){

    vegetacao.forEach(v=>{

        ctx.font =
            v.tamanho +
            "px serif";

        ctx.fillText(
            v.emoji,
            v.x,
            v.y
        );

    });

}

/* ==========================
   NÓS DA TRILHA
========================== */

function desenharNos(){

    const pontos = [

        [0,0],[1,0],[2,0],
        [0,1],[1,1],[2,1],
        [0,2],[1,2],[2,2],
        [0,3],[1,3],
        [0,4]

    ];

    ctx.fillStyle="#d9b382";

    pontos.forEach(p=>{

        ctx.beginPath();

        ctx.arc(
            px(p[0]),
            py(p[1]),
            35,
            0,
            Math.PI*2
        );

        ctx.fill();

    });

}

/* ==========================
   ANIMAIS
========================== */

function desenharAnimais(){

    animais.forEach(a=>{

        const x = px(a.x);
        const y = py(a.y);

        if(
            progresso < caminho.length &&
            a === caminho[progresso]
        ){

            const raio =
                45 +
                Math.sin(brilho) * 8;

            ctx.save();

            ctx.beginPath();

            ctx.arc(
                x,
                y,
                raio,
                0,
                Math.PI * 2
            );

            ctx.fillStyle =
                "rgba(255,0,0,0.45)";

            ctx.fill();

            ctx.restore();
        }

        ctx.font = "64px serif";

        ctx.fillText(
            a.emoji,
            x - 30,
            y + 20
        );
    });
}

/* ==========================
   JIPE
========================== */

function desenharJipe(){
    const x = px(jeep.x);
    const y = py(jeep.y);

    ctx.save();
    ctx.translate(x, y);

    // Lógica de Espelhamento vs Rotação
    if (anguloJipe === Math.PI) {
        // --- MOVIMENTO PARA A DIREITA (Espelhar) ---
        ctx.scale(-1, 1); // Inverte horizontalmente
        // Como espelhamos, o texto desenhado em (-30, 20) precisa de ajuste se quiser manter a posição visual exata,
        // mas geralmente funcionar bem apenas com o scale.
        // Opcional: ctx.translate(-60, 0) se o ponto de ancoragem sair do lugar.
    } else {
        // --- MOVIMENTOS PARA CIMA, BAIXO E ESQUERDA (Rotacionar) ---
        ctx.rotate(anguloJipe);
    }

    ctx.font = "64px serif";
    // Desenha o jipe. Note que ao espelhar, a coordenada X negativa inverte o lado.
    ctx.fillText("🚙", -30, 20); 

    ctx.restore();
}

/* ==========================
   CHEGADA
========================== */

function desenharChegada(){

    ctx.font="64px serif";

    ctx.fillText(
        "🏁",
        px(chegada.x)-30,
        py(chegada.y)+20
    );

}

/* ==========================
   TOQUE
========================== */

canvas.addEventListener("click",clicar);


function clicar(e){
iniciarMusica();
    e.preventDefault();

    let rect =
        canvas.getBoundingClientRect();

    let cx;
    let cy;

    if(e.touches){

        cx =
            e.touches[0].clientX
            - rect.left;

        cy =
            e.touches[0].clientY
            - rect.top;

    }else{

        cx =
            e.clientX
            - rect.left;

        cy =
            e.clientY
            - rect.top;

    }

    cx *=
        canvas.width /
        rect.width;

    cy *=
        canvas.height /
        rect.height;

    animais.forEach(a=>{

        let ax = px(a.x);
        let ay = py(a.y);

        let dist =
            Math.hypot(
                cx-ax,
                cy-ay
            );

        if(dist < 50){

            verificarAnimal(a);

        }

    });

}

/* ==========================
   LÓGICA
========================== */

function verificarAnimal(a){

    let esperado =
        caminho[progresso];

    if(a !== esperado){

        errouAnimal(a);
        return;
    }

    acertouAnimal(a);

}

function acertouAnimal(a){
    moverJipePara(a.x, a.y);

    if(
        progresso >= caminho.length
    ){
        vitoria();
    }
}

function errouAnimal(a){
    /* sem mudança */
}

function jipeChegouNoDestino(){
    // Só incrementa se ainda estiver na fase de coletar animais (0 a 4)
    if (progresso < 5) {
        progresso++;
        contador.innerHTML = progresso;
    }

    // Verifica vitória se já coletou os 5
    if(progresso >= 5){
        vitoria();
    }
}

function reiniciarJogo(){
// 1. Reseta variáveis de progresso
progresso = 0;
contador.innerHTML = "0";

// 2. Reseta posição do jipe para a chegada (que é o início agora)
jeep.x = 0;
jeep.y = 0;
//anguloJipe = -Math.PI / 2; // Apontando para cima
anguloJipe = Math.PI; // Apontando para cima

// 3. Sorteia novos animais
const novoCaminho = embaralhar(animais).slice(0, 5);
// Atualiza a variável global 'caminho'
// Nota: Se 'caminho' for 'const', você precisará declará-la como 'let' lá em cima no código original.
// Se não puder mudar para 'let', a lógica de embaralhar deve ser feita de outra forma.
// Assumindo que você possa mudar 'const caminho' para 'let caminho':
caminho.length = 0; 
caminho.push(...novoCaminho);

// 4. Esconde o vídeo (garantia)
const video = document.getElementById("video-vitoria");
video.style.display = "none";
video.pause();
video.currentTime = 0;

// 5. O loop já está rodando, então o jogo volta a aceitar cliques imediatamente
console.log("Jogo reiniciado!");
}

function vitoria(){
// Move o jipe para a bandeira se ainda não estiver lá
if (jeep.x !== chegada.x || jeep.y !== chegada.y) {
 moverJipePara(chegada.x, chegada.y);
}else{
 //somSafari.pause();
 // --- LÓGICA DO VÍDEO ---
 const video = document.getElementById("video-vitoria");
 // Mostra o vídeo
 video.style.display = "block";
 // Toca o vídeo
 video.play().catch(error => {
  console.log("Erro ao tentar tocar o vídeo automaticamente (política do navegador):", error);
  // Navegadores modernos às vezes bloqueiam autoplay com som. 
  // Se falhar, o usuário pode precisar clicar para tocar.
 });

 // Opcional: Mostrar o botão de reiniciar apenas quando o vídeo terminar
 video.onended = function() {
 reiniciarJogo();
 somSafari.play();
 //            video.style.display = "none"; // Esconde o vídeo ao terminar
 //            document.getElementById("btn-reiniciar").style.display = "inline-block"; // Mostra o botão
 };

}
}

/* ==========================
   LOOP
========================== */

function desenhar(){

    brilho += 0.28;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    desenharVegetacao();
    desenharTrilhas();
    desenharNos();
    desenharAnimais();
    desenharChegada();
    desenharJipe();
}

/* ==========================
   MOVIMENTO (NOVO LOOP LOGIC)
========================== */

function loop(){
if(movendoJipe && destinoJipe){
 let dx = destinoJipe.x - jeep.x;
 let dy = destinoJipe.y - jeep.y;

 // 🔴 Move no eixo X primeiro
 if(Math.abs(dx) > 0.05){
  jeep.x += Math.sign(dx) * velocidadeJipe;
  // Se nasce apontando p/ Esquerda:
  // Ir p/ Direita (dx > 0) precisa girar 180º (Math.PI)
  // Ir p/ Esquerda (dx < 0) já está pronto (0)
  anguloJipe = dx > 0 ? Math.PI : 0; 
 }
 // 🔵 Depois move no eixo Y
 else if(Math.abs(dy) > 0.05){
  jeep.y += Math.sign(dy) * velocidadeJipe;
  // Se nasce apontando p/ Esquerda:
  // Ir p/ Baixo (dy > 0) precisa girar 90º horário (-PI/2)
  // Ir p/ Cima (dy < 0) precisa girar 90º anti-horário (PI/2)
  anguloJipe = dy > 0 ? -Math.PI / 2 : Math.PI / 2;
 }   
 // 🟢 Chegou
 else{
  jeep.x = destinoJipe.x;
  jeep.y = destinoJipe.y;
  movendoJipe = false;
  jipeChegouNoDestino();
 }
}

desenhar(); // O desenho continua para mostrar o jipe parado na bandeira

requestAnimationFrame(loop);

}  

loop();

</script>

</body>
</html>
